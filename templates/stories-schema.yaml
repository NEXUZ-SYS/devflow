# stories-schema.yaml — Reference schema for autonomous loop story tracking
# Generated by devflow:prevc-planning during Planning phase
# Location: .context/workflow/stories.yaml

feature: "<feature name from plan>"
autonomy: supervised | assisted | autonomous
created: "<ISO 8601 timestamp>"
escalation:
  max_retries_per_story: 2          # attempts before escalating a single story
  max_consecutive_failures: 3       # consecutive failures before circuit breaker
  security_immediate: true          # escalate immediately on security findings
  upgrade_after_streak: 5           # suggest autonomy upgrade after N successes
stats:
  total: 0
  completed: 0
  failed: 0
  escalated: 0
  consecutive_failures: 0
  current_autonomy: "<same as autonomy field, changes on escalation/upgrade>"
stories:
  - id: "S1"                        # unique ID (S1, S2, ...)
    title: "<short description>"
    description: "<what to implement — must fit in 1 context window>"
    agent: "<specialist agent name>" # e.g. backend-specialist, frontend-specialist
    priority: 1                      # execution order (lower = first)
    status: pending                  # pending | in_progress | completed | failed | escalated
    attempts: 0
    blocked_by: []                   # story IDs that must complete first
    # Fields populated during/after execution:
    # duration_s: 0
    # error: "<last error message>"
    # completed_at: "<ISO 8601 timestamp>"
