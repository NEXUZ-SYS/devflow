name: Version guard

# Barra no PR qualquer inconsistência entre os 3 version files, regressão de
# versão ou "pulo" (transição que não seja um único incremento semver válido).
# Teria barrado o salto histórico 1.23.3 → 1.23.10.

on:
  pull_request:
    paths:
      - ".claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
      - ".cursor-plugin/plugin.json"

permissions:
  contents: read

jobs:
  guard:
    name: Validar versão (consistência + transição)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: version-guard
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          node scripts/lib/version-guard.mjs --root . --base-ref "origin/${{ github.base_ref }}"
