name: Release (bump de versão)

# Bump de versão CONTROLADO e único por release. Substitui o auto-bump local
# por commit (causa do "pulo" de versão). Disparo manual: escolha patch/minor/
# major; o job roda scripts/bump-version.sh, atualiza os 3 version files +
# known-hashes e abre um RELEASE PR (respeita branch protection da main).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump (semver)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Bump + abrir release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo p/ gen-known-hashes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (scripts/bump-version.sh)
        id: bump
        run: |
          set -e
          bash scripts/bump-version.sh "${{ inputs.bump }}"
          NEW=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' .claude-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Nova versão: $NEW"

      - name: Validar a transição (version-guard)
        run: |
          node scripts/lib/version-guard.mjs --root . --base-ref origin/${{ github.ref_name }}

      - name: Abrir release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git switch -c "$BRANCH"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                  .cursor-plugin/plugin.json assets/provenance/known-hashes.json
          git commit -m "chore(release): v${VERSION}"
          git push -u origin "$BRANCH"
          gh pr create --base "${{ github.ref_name }}" --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "Bump \`${{ inputs.bump }}\` → **v${VERSION}** via pipeline de release (\`.github/workflows/release.yml\`).

          Atualiza os 3 version files + \`known-hashes.json\`.

          **Checklist antes do merge:**
          - [ ] CHANGELOG.md tem a entrada \`## [${VERSION}]\` (promova o \`[Unreleased]\`).
          - [ ] README.md \"Histórico de Versões\" tem a linha de ${VERSION}.

          O bump é único e controlado — não há mais auto-bump local por commit."
