name: Release (bump de versĂŁo)

# Bump de versĂŁo CONTROLADO e Ăşnico por release. Substitui o auto-bump local
# por commit (causa do "pulo" de versĂŁo). Disparo manual: escolha patch/minor/
# major; o job roda scripts/bump-version.sh, atualiza os 3 version files +
# known-hashes e abre um RELEASE PR (respeita branch protection da main).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump (semver)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Bump + abrir release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histĂłrico completo p/ gen-known-hashes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (scripts/bump-version.sh)
        id: bump
        run: |
          set -e
          bash scripts/bump-version.sh "${{ inputs.bump }}"
          NEW=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' .claude-plugin/plugin.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Nova versĂŁo: $NEW"

      - name: Validar a transiĂ§ĂŁo (version-guard)
        run: |
          node scripts/lib/version-guard.mjs --root . --base-ref origin/${{ github.ref_name }}

      - name: Abrir release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git switch -c "$BRANCH"
          # CHANGELOG.md Ă© cortado ([Unreleased] â†’ [X.Y.Z]) pelo bump-version.sh (atĂ´mico
          # com o bump). DEVE ser staged junto â€” senĂŁo o corte Ă© descartado e o release PR
          # sai com versĂŁo bumpada e CHANGELOG intacto (drift).
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                  .cursor-plugin/plugin.json assets/provenance/known-hashes.json \
                  CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git push -u origin "$BRANCH"
          gh pr create --base "${{ github.ref_name }}" --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "Bump \`${{ inputs.bump }}\` â†’ **v${VERSION}** via pipeline de release (\`.github/workflows/release.yml\`).

          Atualiza os 3 version files + \`known-hashes.json\` + o **corte do CHANGELOG** (\`[Unreleased]\` â†’ \`## [${VERSION}]\`, automĂˇtico via \`bump-version.sh\`).

          **Checklist antes do merge:**
          - [x] CHANGELOG.md \`## [${VERSION}]\` â€” cortado automaticamente (verifique se as notas estĂŁo completas).
          - [ ] README.md \"HistĂłrico de VersĂµes\" tem a linha de ${VERSION} (atualizaĂ§ĂŁo manual, se aplicĂˇvel).

          O bump Ă© Ăşnico e controlado â€” nĂŁo hĂˇ mais auto-bump local por commit."
