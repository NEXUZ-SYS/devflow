# .context/.devflow.yaml — DevFlow project configuration
# Generated by: /devflow config
# Run /devflow config to reconfigure

git:
  strategy: branch-flow
  protectedBranches: [main, develop]
  prCli: gh
  branchProtection: true
  autoFinish: true
  # Bump de versao e feito pela pipeline de release (Actions -> Release), nao no finish local.
  versioning: pipeline

mempalace:
  enabled: true
  autoMine: post-merge
  budget: 1000

# Pipeline de sinal verificável (ADR-013). Comandos são argv arrays; os runners
# enumeram por git ls-files + convenção. onTaskComplete = subconjunto do loop rápido.
verify:
  unit:        ["bash", "tests/run-unit.sh"]
  integration: ["bash", "tests/run-integration.sh"]
  e2e:         ["bash", "tests/run-e2e.sh"]
  lint:        ["bash", "tests/run-lint.sh"]
  onTaskComplete: [unit]
