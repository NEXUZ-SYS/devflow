# Catálogo curado de concerns operacionais para a skill standards-builder.
# Cada entry descreve uma regra cross-cutting que NÃO depende de lib específica.
# inverseHints lista libs/keywords que "puxam" o concern (ex: ADR sobre Zod → runtime-validation).
#
# v1.0 traz 6 concerns iniciais cobrindo os fluxos testados (F1-F4 + E2E sandbox).
# Concerns adicionais podem ser registrados em .context/standards/concerns.local.yaml.

entries:
  - id: runtime-validation
    summary: Validar payloads na borda externa antes de tocar lógica de domínio
    category: contracts
    defaultApplyTo:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.py"
    inverseHints:
      - zod
      - yup
      - valibot
      - pydantic
      - marshmallow
      - io-ts
      - ajv
    principleTemplate: |
      Toda entrada vinda de borda externa ({{boundaryList}}) DEVE ser parsed
      contra um schema declarado antes de qualquer state update ou render.
      Tipos de domínio derivam do schema; nunca declarados em paralelo.
    antiPatternTemplate:
      - rule: "Aceitar `unknown` da borda sem parse"
        correct: "`Schema.parse(input)` na primeira linha após I/O"
      - rule: "Declarar `type Foo` paralelo a um schema existente"
        correct: "Derivar tipo via `infer` do schema (DRY)"
      - rule: "Validar duas vezes o mesmo dado no fluxo"
        correct: "Parse na borda, propaga tipo estreito"
    linterHints:
      - "AST: fetch().then(res => res.json()) sem .parse() na sequência"
      - "ESLint custom: proibir `type X = ...` onde existe `XSchema` no mesmo pacote"
    relatedAdrCategories:
      - qualidade-testes
      - frontend
      - backend
      - bff

  - id: error-handling
    summary: Como erros são lançados, capturados e propagados pelo sistema
    category: errors
    defaultApplyTo:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.py"
    inverseHints: []
    principleTemplate: |
      Erros de domínio estendem uma classe base (BaseError / DomainError) e carregam
      `code` + `cause` + contexto estruturado. NUNCA `throw new Error("string")` em
      código de produção. Captura sempre nomeia o tipo esperado; rethrow preserva cause.
    antiPatternTemplate:
      - rule: "throw new Error sem contexto"
        correct: "throw new DomainError({ code, cause, ctx })"
      - rule: "catch (e) sem inspecionar tipo"
        correct: "catch (e) { if (!(e instanceof DomainError)) throw e; ... }"
      - rule: "swallow de erro silencioso (catch vazio)"
        correct: "logger.warn + rethrow ou explicit fallback documentado"
    linterHints:
      - "regex: throw\\s+new\\s+Error\\("
      - "ESLint: prefer-promise-reject-errors, no-throw-literal"
    relatedAdrCategories:
      - frontend
      - bff
      - backend

  - id: pre-commit-hygiene
    summary: Format + lint + typecheck obrigatórios antes de cada commit
    category: hygiene
    defaultApplyTo:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.py"
    inverseHints:
      - husky
      - lefthook
      - pre-commit
      - lint-staged
      - biome
      - eslint
      - prettier
      - ruff
      - black
    principleTemplate: |
      Todo commit passa por formatter + linter + typechecker antes de aterrissar no
      working tree. Hooks rodam em modo staged-only para velocidade; CI roda full no
      PR. Falha de hook bloqueia o commit — nunca usar --no-verify exceto em emergência
      documentada (não a regra).
    antiPatternTemplate:
      - rule: "Skip de hook (--no-verify) como hábito"
        correct: "Investigar e corrigir a falha; --no-verify é exceção justificada"
      - rule: "Format-on-save desabilitado no editor"
        correct: "Editor formata + organize imports automaticamente (settings versionados)"
      - rule: "Lint só roda em CI, não local"
        correct: "Hook pre-commit roda lint nos staged files; CI roda full"
    linterHints:
      - "Verificar existência de .husky/ ou lefthook.yml ou .pre-commit-config.yaml"
      - "package.json scripts contém format, lint, typecheck idempotentes"
    relatedAdrCategories:
      - frontend
      - bff
      - backend
      - qualidade-testes

  - id: test-discipline
    summary: Testes colocalizados, nomeados por comportamento, isolados por unidade
    category: testing
    defaultApplyTo:
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.test.mjs"
      - "**/test_*.py"
      - "**/*_test.py"
    inverseHints:
      - vitest
      - jest
      - pytest
      - playwright
      - cypress
      - mocha
    principleTemplate: |
      Test files vivem ao lado do código testado (não em `__tests__/` paralelo isolado).
      Cada teste descreve UM comportamento observável; nome usa verbo no presente
      (\"returns X when Y\"). Mocks só na fronteira de I/O; lógica de domínio testa
      direto. Coverage não é meta — confiança é. Test-first (TDD) é o default.
    antiPatternTemplate:
      - rule: "Testes em diretório paralelo (`tests/` fora de `src/`)"
        correct: "Colocalize: `feature/foo.ts` + `feature/foo.test.ts`"
      - rule: "Test names descrevem método (`testFoo`) em vez de comportamento"
        correct: "`foo returns X when Y` / `should reject when Z`"
      - rule: "Mockar lógica de domínio para passar teste"
        correct: "Mock só na borda (rede, DB, FS); domínio testa real"
    linterHints:
      - "Detectar `__tests__/` paralelo fora do path do código testado"
      - "Detectar coverage como assertion em CI (anti-pattern de meta-de-coverage)"
    relatedAdrCategories:
      - qualidade-testes
      - frontend
      - backend

  - id: naming-conventions
    summary: Nomes de arquivos, símbolos e exports seguem regras explícitas e estáveis
    category: naming
    defaultApplyTo:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.py"
    inverseHints: []
    principleTemplate: |
      Arquivos: kebab-case (TS/JS) ou snake_case (Python). Símbolos: camelCase
      (variáveis/funções), PascalCase (tipos/classes), SCREAMING_SNAKE (constantes
      de módulo). Exports nomeados por padrão; default export só em entry points.
      Nomes descrevem propósito, não implementação ({{lib}} não aparece em nome).
    antiPatternTemplate:
      - rule: "Default exports espalhados pela codebase"
        correct: "Named exports; default só em pages/routes/entry points"
      - rule: "Nome com prefixo de lib (`ZodUserSchema`, `ReactUserCard`)"
        correct: "`UserSchema`, `UserCard` — lib é detalhe de implementação"
      - rule: "Abreviações não documentadas (`usr`, `pmt`, `cfg`)"
        correct: "Nome completo (`user`, `payment`, `config`) ou termo de domínio do glossário"
    linterHints:
      - "ESLint @typescript-eslint/naming-convention"
      - "Detectar default export fora de pages/entry"
    relatedAdrCategories:
      - frontend
      - bff
      - backend

  - id: observability-spans
    summary: Operações de I/O e LLM emitem spans estruturados com atributos consistentes
    category: obs
    defaultApplyTo:
      - "src/**/*.ts"
      - "src/**/*.py"
      - "**/route.ts"
      - "**/handler.py"
    inverseHints:
      - datadog
      - opentelemetry
      - otel
      - sentry
      - newrelic
      - jaeger
      - honeycomb
    principleTemplate: |
      Cada operação de I/O (HTTP, DB, LLM call, queue) abre um span com nome
      `<domain>.<operation>` e atributos OTel GenAI-compatíveis quando aplicável
      (gen_ai.system, gen_ai.request.model, gen_ai.usage.*). Erros marcam o span
      como `ERROR` antes de re-throw. Span IDs aparecem em logs estruturados.
    antiPatternTemplate:
      - rule: "Operação de LLM sem span ou sem atributos de modelo/tokens"
        correct: "Span com `gen_ai.*` atributos; tokens medidos no callback"
      - rule: "Span name dinâmico com user input (cardinality bomb)"
        correct: "Span name é constante; user input vai como atributo"
      - rule: "Erro engolido sem marcar span como ERROR"
        correct: "span.recordException(e) + span.setStatus({ code: ERROR }); rethrow"
    linterHints:
      - "AST: chamada a llm.chat / openai.complete sem wrapper de span"
      - "Detectar span.setName com template literal contendo variável"
    relatedAdrCategories:
      - bff
      - backend
      - qualidade-testes

  - id: layer-boundaries
    summary: Import boundaries e dependency rule entre camadas (FSD/hexagonal/clean)
    category: architecture
    defaultApplyTo:
      - "src/**/*.ts"
      - "src/**/*.tsx"
    inverseHints:
      - fsd
      - feature-sliced
      - hexagonal
      - clean-architecture
      - ddd
      - ports-adapters
    principleTemplate: |
      Imports respeitam a direção da camada: domínio não importa infra; slice não
      importa slice irmão diretamente (usa public API da camada); infra implementa
      portas definidas pelo domínio. Cada camada expõe um index público — imports
      internos são proibidos entre camadas. A regra de dependência flui para dentro
      (UI → App → Domain; Infra implementa Domain).
    antiPatternTemplate:
      - rule: "Domínio importa adapter de infra diretamente"
        correct: "Domínio define porta (interface); infra implementa; IoC resolve"
      - rule: "Slice A importa módulo interno de Slice B (fora do index público)"
        correct: "Importar apenas via public API do slice (index.ts da feature)"
      - rule: "Camada de UI chama repositório de dados diretamente"
        correct: "UI chama use-case/service; use-case acessa repositório"
    linterHints:
      - "AST: import de camada externa dentro de src/domain (ex: src/infra → src/domain)"
      - "ESLint eslint-plugin-boundaries ou @feature-sliced/eslint-config para FSD"
      - "Detectar import de path interno (não-index) entre features distintas"
    relatedAdrCategories:
      - arquitetura
      - frontend
      - backend
      - bff

  - id: api-conventions
    summary: Convenções de design de API REST (verbos, status codes, error envelope, paginação, versionamento)
    category: contracts
    defaultApplyTo:
      - "src/**/*.ts"
    inverseHints:
      - rest
      - openapi
      - fastify
      - express
      - nestjs
    principleTemplate: |
      Endpoints usam verbos HTTP semânticos (GET/POST/PUT/PATCH/DELETE). Status codes
      seguem RFC 9110: 2xx sucesso, 4xx erro do cliente, 5xx erro do servidor. Erros
      retornam envelope padronizado `{ error: { code, message, details } }`. Paginação
      via cursor (preferido) ou offset com metadados `{ data, meta: { total, page } }`.
      Versionamento por path prefix (/v1/) ou header Accept. Nunca quebrar contrato
      sem deprecação e prazo anunciados.
    antiPatternTemplate:
      - rule: "Retornar 200 OK com corpo de erro (ex: { error: 'not found' })"
        correct: "Retornar 404 com envelope de erro padronizado"
      - rule: "Usar POST para todas as operações (RPC-style sobre REST)"
        correct: "Usar verbo semântico correto (GET lê, PUT/PATCH atualiza, DELETE remove)"
      - rule: "Paginação sem metadados de total ou cursor de próxima página"
        correct: "Incluir meta com cursor/total; documentar no OpenAPI"
    linterHints:
      - "Verificar definição de OpenAPI/Swagger (openapi.yaml ou swagger decorators)"
      - "AST: response.status(200) seguido de corpo com campo 'error'"
      - "Detectar rotas sem versionamento em path ou header"
    relatedAdrCategories:
      - backend
      - bff
      - contratos

  - id: domain-events
    summary: Naming, payload e versionamento de eventos de domínio
    category: contracts
    defaultApplyTo:
      - "src/**/*.ts"
    inverseHints:
      - eventbridge
      - kafka
      - pubsub
      - rabbitmq
    principleTemplate: |
      Eventos de domínio têm nome no passado e formato `<Domínio>.<Entidade><Ação>Ocorreu`
      (ex: Pagamento.CobrancaAprovadaOcorreu). Payload inclui `eventId`, `occurredAt`,
      `version`, `aggregateId` e dados imutáveis do momento do fato. Schemas são
      versionados (v1, v2) e consumidores antigos suportados por período de deprecação.
      Eventos nunca carregam referências mutáveis — apenas dados do momento da ocorrência.
    antiPatternTemplate:
      - rule: "Evento com nome no imperativo ou presente (ex: ProcessarPagamento)"
        correct: "Nome no passado descrevendo fato ocorrido (ex: PagamentoProcessadoOcorreu)"
      - rule: "Payload sem version ou sem occurredAt"
        correct: "Incluir campos obrigatórios: eventId, version, occurredAt, aggregateId"
      - rule: "Quebrar schema de evento sem compatibilidade retroativa"
        correct: "Publicar v2 em paralelo; deprecar v1 com prazo; manter consumidores antigos"
    linterHints:
      - "AST: publicação de evento sem campo 'version' no payload"
      - "Detectar nome de evento sem sufixo 'Ocorreu' ou 'Happened' (naming convention)"
      - "Verificar registro de schema no registry (ex: AWS Glue, Confluent Schema Registry)"
    relatedAdrCategories:
      - backend
      - contratos
      - arquitetura

  - id: secret-conventions
    summary: Naming, escopo e rotação de secrets; nunca em código ou log
    category: contracts
    defaultApplyTo:
      - "**/*.ts"
      - "**/*.env*"
    inverseHints:
      - dotenv
      - secret-manager
      - vault
    principleTemplate: |
      Secrets são lidos exclusivamente de variáveis de ambiente ou secret manager;
      NUNCA hardcoded em código, config files versionados ou logs. Nomes seguem
      SCREAMING_SNAKE_CASE com prefixo de escopo (ex: DB_PASSWORD, STRIPE_API_KEY).
      Rotação é automatizada; TTL máximo por tipo de secret definido em runbook.
      Logs nunca imprimem valores de secrets — mascarar antes de qualquer output.
    antiPatternTemplate:
      - rule: "Secret hardcoded em código ou arquivo de config versionado"
        correct: "Ler de process.env ou secret manager; .env nunca commitado"
      - rule: "Secret logado em debug ou trace sem mascaramento"
        correct: "Mascarar valor antes de logar: 'sk_****' ou omitir completamente"
      - rule: "Secret sem TTL ou rotação manual ad-hoc"
        correct: "Rotação automatizada via secret manager; TTL documentado no runbook"
    linterHints:
      - "regex: (password|secret|api_key|token)\\s*=\\s*['\"][^'\"]{8,}"
      - "Verificar .gitignore contém .env* e secrets/"
      - "AST: console.log com variável cujo nome contém 'secret', 'key', 'password', 'token'"
    relatedAdrCategories:
      - backend
      - bff
      - seguranca

  - id: commit-hygiene
    summary: Conventional Commits — tipo, escopo e descrição imperativa
    category: process
    defaultApplyTo:
      - "**/*"
    inverseHints:
      - commitlint
      - husky
      - conventional-commits
    principleTemplate: |
      Todo commit segue Conventional Commits: `<tipo>(<escopo>): <descrição imperativa>`.
      Tipos válidos: feat, fix, chore, docs, refactor, test, ci, perf, revert.
      Descrição no imperativo presente (adiciona, corrige, remove — não adicionado/corrigido).
      Corpo do commit explica o porquê, não o quê. Breaking changes marcados com `!`
      ou footer `BREAKING CHANGE:`. Um commit = uma unidade lógica de mudança.
    antiPatternTemplate:
      - rule: "Mensagem de commit sem tipo (ex: 'arruma bug')"
        correct: "fix(auth): corrige validação de token expirado"
      - rule: "Descrição no passado ou substantivo ('adicionado X', 'adição de X')"
        correct: "Imperativo presente: 'adiciona X', 'corrige Y', 'remove Z'"
      - rule: "Commit gigante misturando feature + fix + refactor"
        correct: "Um commit por unidade lógica; refactor separado de feature"
    linterHints:
      - "commitlint com @commitlint/config-conventional"
      - "Hook commit-msg valida formato antes de aceitar o commit"
      - "Detectar commits sem tipo ou com tipo fora do enum permitido"
    relatedAdrCategories:
      - qualidade-testes
      - processo

  - id: security
    summary: Higiene de segurança transversal — authn/authz, secrets, output escaping, rate-limit e dependências
    category: seguranca
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - firebase-admin
      - bcrypt
      - argon2
      - helmet
      - csp
      - cors
      - zod
      - crypto
    principleTemplate: |
      Todo input externo é hostil até validado. Defense in depth: validação na borda +
      authn/authz na primeira linha do handler + output escapado para o sink + secrets
      exclusivamente via env/secret-manager + rate-limit em endpoints sensíveis.
      Least privilege em service accounts e tokens. Nunca logar PII, secrets ou headers
      de autenticação. Dependências com CVE high/critical bloqueiam CI.
    antiPatternTemplate:
      - rule: "Handler acessa recurso sem verificar authn/authz primeiro"
        correct: "requireUser(req) na primeira linha; verificar ownership antes de mutar"
      - rule: "Secret hardcoded em código ou arquivo de config versionado"
        correct: "Ler de process.env ou secret manager; .env jamais commitado"
      - rule: "dangerouslySetInnerHTML com output de LLM sem sanitização"
        correct: "Tratar output de IA como untrusted; sanitizar antes de render HTML"
      - rule: "SQL montado por concatenação de string"
        correct: "Queries parametrizadas ($1, $2) ou query builder com bind"
    linterHints:
      - "regex: (password|secret|api_key|token)\\s*=\\s*['\"][^'\"]{8,}"
      - "Verificar .gitignore contém .env* e secrets/"
      - "ESLint no-secrets ou horusec para scan de credentials"
      - "npm audit / pip-audit em CI: bloquear high/critical sem mitigação"
    relatedAdrCategories:
      - seguranca
      - backend
      - bff
      - frontend

  - id: performance
    summary: Rendering, bundle size, data fetching, queries e latência percebida
    category: performance
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - next/dynamic
      - react-query
      - prisma
      - pg-pool
      - p-limit
      - bundle-analyzer
    principleTemplate: |
      Operações independentes correm em paralelo (Promise.all, não await em loop).
      Sem N+1: joins, getAll ou DataLoader em vez de query dentro de loop. Fetches
      acontecem no Server Component mais próximo de quem usa o dado; bundle client
      não inclui SDKs server-only. Medir antes de otimizar — p99 é o SLO real.
      LCP < 2.5s, INP < 200ms, TTFB < 600ms em p75 mobile são metas mínimas.
    antiPatternTemplate:
      - rule: "await sequencial em loop sobre itens independentes"
        correct: "Promise.all([...items.map(fn)]) ou p-limit para batch controlado"
      - rule: "SELECT * em código de produção"
        correct: "Listar colunas explicitamente; reduz I/O e evita quebra silenciosa"
      - rule: "Import de lib pesada em Client Component"
        correct: "next/dynamic com ssr:false ou manter no servidor; import 'server-only'"
      - rule: "Query sem índice em coluna filtrada"
        correct: "Criar índice antes de promover a produção; EXPLAIN ANALYZE confirma"
    linterHints:
      - "Detectar await dentro de for/forEach (await-in-loop)"
      - "AST: SELECT * em queries SQL"
      - "@next/bundle-analyzer para regressão de bundle em CI"
      - "ESLint no-restricted-imports: proibir dayjs/moment quando Intl resolve"
    relatedAdrCategories:
      - performance
      - frontend
      - backend
      - bff

  - id: documentation
    summary: Quando documentar, quando não documentar e como redigir docs que sobrevivem ao tempo
    category: docs
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - tsdoc
      - jsdoc
      - typedoc
      - mkdocs
      - storybook
    principleTemplate: |
      Código autoexplicativo vence comentário. Documentar o PORQUÊ, não o quê.
      APIs públicas consumidas fora do módulo têm TSDoc com @throws e @example.
      Workarounds levam comentário // HACK: com link para issue. READMEs existem
      em pacotes publicáveis e apps executáveis com estrutura mínima: propósito,
      pré-requisitos, como rodar, como testar, referências. Changelogs automatizados
      a partir de Conventional Commits; docs desatualizadas são bugs.
    antiPatternTemplate:
      - rule: "Comentário que repete literalmente o código ou a assinatura"
        correct: "Comentar o porquê da decisão; renomear função se o quê não é óbvio"
      - rule: "Marcador de tarefa (FIXME/pendência) sem dono e sem issue rastreável"
        correct: "// PENDENCIA(handle): corrigir após #123 — ou remover e abrir issue"
      - rule: "JSDoc em função privada de uma linha com nome autoexplicativo"
        correct: "TSDoc apenas em APIs públicas exportadas entre módulos"
      - rule: "Wiki externa como fonte de verdade desconectada do código"
        correct: "Docs vivem em .contexts/ ou ao lado do código; wiki é espelho, não origem"
    linterHints:
      - "ESLint valid-jsdoc ou eslint-plugin-jsdoc para checar TSDoc incompleto"
      - "Detectar código comentado com regex /* ou // seguido de código TS/JS"
      - "Verificar existência de README.md em pacotes com package.json publicável"
    relatedAdrCategories:
      - processo
      - qualidade-testes
      - arquitetura

  - id: grounding
    summary: Disciplina anti-alucinação — verificar existência real de arquivos, símbolos e APIs antes de referenciar
    category: qualidade
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - glob
      - grep
      - ast-grep
      - typescript
    principleTemplate: |
      Toda referência a arquivo, símbolo, endpoint, versão de lib ou comportamento de
      sistema é verificada no código real antes de afirmar ou agir. Nunca assumir por
      plausibilidade. Verificação precede geração: listar símbolos externos, confirmar
      existência via Read/Glob/Grep, checar versão de lib no lockfile antes de citar API.
      Incerteza é declarada ("não encontrei"), nunca disfarçada com palpite plausível.
    antiPatternTemplate:
      - rule: "Chamar função cujo nome 'parece certo' sem confirmar exportação"
        correct: "Grep por declaração da função antes de invocar; ler o arquivo se necessário"
      - rule: "Importar de path que segue convenção sem confirmar que o arquivo existe"
        correct: "Glob ou Read para confirmar existência antes de gerar o import"
      - rule: "Usar opção de config porque 'framework X normalmente tem isso'"
        correct: "Checar type definitions da versão instalada (package.json + node_modules)"
      - rule: "Env var lida sem confirmar que está no schema de config"
        correct: "Grep em env.ts ou .env.example antes de referenciar a var"
    linterHints:
      - "TypeScript strict mode: noImplicitAny, strictNullChecks detectam referências fantasmas"
      - "ts-prune ou ts-unused-exports detectam exports que não existem"
      - "Verificar que todos os imports resolvem (tsc --noEmit)"
    relatedAdrCategories:
      - qualidade-testes
      - processo

  - id: migration
    summary: Mudanças de schema e dados em fases — expand, migrate, contract — com idempotência e zero-downtime
    category: data
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - prisma
      - flyway
      - alembic
      - knex
      - drizzle
      - sequelize
    principleTemplate: |
      Toda migração não-trivial segue expand → migrate → contract: adicionar nova forma,
      mover dados/tráfego, depois remover a antiga. Código tolera schema velho e novo
      durante transição. Backfills são idempotentes, batched (1k-10k linhas) com checkpoint.
      Índices criados com CONCURRENTLY (sem lock). Nunca rodar migration no boot de app;
      sempre como job dedicado no pipeline. Plano de rollback documentado antes do deploy.
    antiPatternTemplate:
      - rule: "Renomear ou dropar coluna em um único passo de deploy"
        correct: "Adicionar nova coluna, dual-write, backfill, migrar leitura, depois dropar"
      - rule: "NOT NULL sem default em tabela com dados existentes"
        correct: "Adicionar nullable, backfill em batches, aplicar NOT NULL em release separada"
      - rule: "Migration no startup da aplicação (ORM synchronize: true em produção)"
        correct: "Migration como step explícito do pipeline, auditável e com exit code verificado"
      - rule: "Backfill UPDATE sem WHERE filtrando apenas rows não processadas"
        correct: "WHERE new_col IS NULL ou marker de checkpoint; idempotente por design"
    linterHints:
      - "Verificar ausência de 'synchronize: true' em config de ORM de produção"
      - "Detectar CREATE INDEX sem CONCURRENTLY em migrations Postgres"
      - "Verificar existência de migration down correspondente a cada migration up"
    relatedAdrCategories:
      - data
      - backend
      - arquitetura

  - id: data-modeling
    summary: Modelagem de entidades, identificadores, nullability, normalização e invariantes de domínio
    category: data
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - prisma
      - typeorm
      - drizzle
      - mongoose
      - sqlalchemy
      - zod
    principleTemplate: |
      Entidades têm identidade própria (ULID/UUID v4, gerado no domínio). Value objects
      são imutáveis e comparados por valor. Nullability é decisão explícita: null significa
      "ausente por design"; string vazia e -1 jamais representam "ausente". Dinheiro em
      inteiro (centavos) + moeda como value object. Timestamps em UTC, ISO 8601 com offset.
      Normalização por padrão; desnormalizar só com motivo mensurável e declarado.
    antiPatternTemplate:
      - rule: "Float para armazenar dinheiro"
        correct: "bigint de centavos + campo currency: string (ISO 4217)"
      - rule: "Auto-increment numérico como identificador externo"
        correct: "ULID ou UUID v4 gerado no domínio antes de persistir"
      - rule: "Boolean flags múltiplos para estado mutuamente exclusivo (isActive, isPending)"
        correct: "Enum union literal: status: 'active' | 'pending' | 'cancelled'"
      - rule: "Campo nullable sem semântica documentada"
        correct: "Documentar: null = 'usuário não informou' vs campo ausente = 'não carregado'"
    linterHints:
      - "TypeScript: branded types para UserId, OrderId (ts-brand ou zod .brand())"
      - "Detectar uso de float/number para campos de dinheiro em schemas Zod/Prisma"
      - "ESLint custom: proibir auto-increment (serial/identity) em entidades com API pública"
    relatedAdrCategories:
      - data
      - backend
      - arquitetura
      - contratos

  - id: schemas
    summary: Schema-first — tipos derivam do schema, evolução compatível, IDs brandados, sem duplicação
    category: contracts
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - zod
      - valibot
      - yup
      - io-ts
      - typebox
      - openapi
      - json-schema
    principleTemplate: |
      Schema é fonte de verdade do shape dos dados. Tipos TS derivam do schema (z.infer),
      nunca declarados em paralelo. Schemas vivem em arquivos dedicados (*.schema.ts)
      reutilizáveis entre client e server. Evolução é aditiva: campo opcional sim;
      tornar obrigatório ou renomear exige versionamento. IDs semânticos usam branded
      types (.brand<"UserId">()). Refinements (regex, range, regra de negócio) vivem
      no schema, não no handler.
    antiPatternTemplate:
      - rule: "type interface Foo declarado manualmente paralelo a z.object existente"
        correct: "type Foo = z.infer<typeof FooSchema> — único source of truth"
      - rule: "Adicionar campo obrigatório a schema existente sem migração"
        correct: "Novo campo opcional (z.optional()) + backfill + constraint em release separada"
      - rule: "z.any() em campo crítico de payload"
        correct: "Declarar shape exato ou z.unknown() + refinement com parse explícito"
      - rule: "Schema inline no handler de 200 linhas"
        correct: "Extrair para arquivo *.schema.ts, exportar e reutilizar"
    linterHints:
      - "ESLint custom: proibir `type X = { ... }` quando existe `XSchema` no mesmo pacote"
      - "Detectar z.any() em schemas de boundary (rotas, eventos, webhooks)"
      - "Verificar que schemas de API têm correspondente em openapi.yaml ou equivalente"
    relatedAdrCategories:
      - contratos
      - backend
      - frontend
      - bff

  - id: code-review
    summary: Escopo de PR, checklists de autor e reviewer, severidade de comentários e gates obrigatórios
    category: process
    defaultApplyTo:
      - "**/*.{ts,tsx,js,jsx,py,go}"
    inverseHints:
      - github
      - gitlab
      - pull-request
      - codeowners
      - danger
    principleTemplate: |
      PR focado em um objetivo, máximo 400 linhas de diff efetivo (exceto lockfiles,
      snapshots, migrations declarativas). Autor: lint + typecheck + testes locais antes
      de abrir; self-review do diff; sem console.log, marcador de tarefa pendente órfão ou código comentado.
      Reviewer: classificar comentários com prefixo blocker/issue/suggestion/nit; propor
      alternativa ao criticar; nunca aprovar com blocker aberto. Gates: sem secret no repo,
      sem dependência com CVE high/critical, sem teste desabilitado sem issue rastreando.
    antiPatternTemplate:
      - rule: "PR misturando refatoração, feature e bugfix"
        correct: "Um PR por objetivo; separe refactor de feature em commits ou PRs distintos"
      - rule: "Comentário de review sem severidade e sem alternativa"
        correct: "blocker: validar input antes de passar ao domínio — sugestão: usar OrderSchema.parse()"
      - rule: "Aprovar PR de IA sem revisar cada linha"
        correct: "Aplicar o mesmo rigor de PR humano: grounding de APIs, testes reais, lógica correta"
      - rule: "Resolver thread de outro reviewer sem resposta"
        correct: "Quem abriu o thread o resolve; autor responde com commit referenciado"
    linterHints:
      - "Danger.js ou equivalente: verificar tamanho do PR, presença de testes, CODEOWNERS"
      - "Detectar it.skip / describe.skip sem comentário inline e issue linkada"
      - "Verificar que PR description não está vazia (CI check)"
    relatedAdrCategories:
      - processo
      - qualidade-testes
      - seguranca

  - id: accessibility
    summary: WCAG 2.2 AA — HTML semântico, ARIA como último recurso, foco, contraste e live regions
    category: ui
    defaultApplyTo:
      - "**/*.{tsx,jsx}"
    inverseHints:
      - radix-ui
      - shadcn
      - axe-core
      - vitest-axe
      - aria
      - wcag
    principleTemplate: |
      Baseline obrigatório: WCAG 2.2 nível AA em todo fluxo público. HTML semântico primeiro:
      usar o elemento nativo correto antes de ARIA. Todo elemento interativo tem nome acessível
      (texto visível, aria-label ou label). Foco visível em todos os interativos; focus trap
      em modais bloqueantes (nunca em popovers). Contraste mínimo 4.5:1 texto normal, 3:1
      texto grande e componentes UI. live regions anunciam mudanças dinâmicas. axe-core em
      testes automatizados + rodada manual com teclado por feature.
    antiPatternTemplate:
      - rule: "div onClick como botão sem role e sem handler de teclado"
        correct: "<button> nativo — traz foco, teclado, role e estados grátis"
      - rule: "outline: none sem substituição visível via :focus-visible"
        correct: "focus-visible:ring-2 do Tailwind ou CSS equivalente com contraste >= 3:1"
      - rule: "placeholder como única indicação de label de campo"
        correct: "<label for> ou <label> envolvendo o input; placeholder apenas complementa"
      - rule: "Mensagem de erro sem aria-describedby no campo afetado"
        correct: "aria-describedby='error-id' no input + aria-invalid='true' + role='alert' na msg"
    linterHints:
      - "eslint-plugin-jsx-a11y: jsx-a11y/click-events-have-key-events, jsx-a11y/no-noninteractive-element-interactions"
      - "Detectar img sem atributo alt (jsx-a11y/alt-text)"
      - "axe-core em testes Vitest via vitest-axe para componentes de UI"
      - "Detectar tabindex com valor positivo (jsx-a11y/tabindex-no-positive)"
    relatedAdrCategories:
      - ui
      - frontend
      - qualidade-testes

  - id: internationalization
    summary: i18n e l10n — strings via t(), ICU MessageFormat, Intl nativa, UTC no backend, locale negociado
    category: ui
    defaultApplyTo:
      - "**/*.{tsx,jsx,ts}"
    inverseHints:
      - next-intl
      - react-i18next
      - i18next
      - formatjs
      - intl
      - icu
    principleTemplate: |
      Toda string user-facing passa por t('chave.semantica'). Chaves namespaced por feature;
      nunca a string em inglês como chave. Plurais e seleção via ICU MessageFormat (não if/else
      manual). Formatação de datas, números e moedas via Intl nativo com locale explícito.
      Timestamps armazenados em UTC; convertidos para fuso do usuário apenas na apresentação.
      Layout usa CSS logical properties (margin-inline-start) para suporte a RTL.
      Locale negociado: URL subpath > perfil do usuário > Accept-Language > default.
    antiPatternTemplate:
      - rule: "String user-facing hardcoded em JSX ou código"
        correct: "t('feature.context.key') com chave semantica e namespaced"
      - rule: "Plural via if (count === 1) ? t('item') : t('items')"
        correct: "ICU plural: t('items', { count }) com categorias zero/one/other"
      - rule: "Intl.DateTimeFormat sem locale explícito"
        correct: "new Intl.DateTimeFormat(locale, options) — nunca confiar no default do runtime"
      - rule: "margin-left/right em layout que precisa suportar RTL"
        correct: "margin-inline-start / margin-inline-end (CSS logical properties)"
    linterHints:
      - "eslint-plugin-i18n-json ou i18next-parser para detectar strings não extraídas"
      - "Detectar hardcoded strings em JSX (eslint-plugin-react/jsx-no-literals customizado)"
      - "Detectar Date.toLocaleString() sem locale explícito"
      - "Verificar que todos os locales em produção têm 100% das chaves traduzidas no CI"
    relatedAdrCategories:
      - ui
      - frontend
      - contratos

  - id: caching
    summary: Estratégia de cache por camada — chaves determinísticas, TTL explícito, invalidação por evento e escopo seguro
    category: performance
    defaultApplyTo:
      - "src/**/*.{ts,tsx}"
    inverseHints:
      - redis
      - memcached
      - unstable_cache
      - revalidateTag
      - stale-while-revalidate
      - cache-control
    principleTemplate: |
      Menor escopo viável: cachear no nível mais próximo do consumidor que preserva
      correção. Chaves determinísticas namespaced com versão: users:v2:profile:{userId}.
      TTL explícito em toda entrada; TTL infinito proibido sem invalidação por evento.
      Invalidação por evento é mecanismo primário; TTL é rede de segurança. Jitter no TTL
      evita stampede. Nunca cachear tokens, secrets, PII em cache compartilhado, ou respostas
      de autorização com TTL longo. Medir hit rate em produção; cache sem observabilidade é dívida.
    antiPatternTemplate:
      - rule: "Chave de cache com email ou CPF em texto claro"
        correct: "Usar userId interno ou hash(email); PII nunca na chave"
      - rule: "TTL infinito sem mecanismo de invalidação por evento"
        correct: "TTL como rede de segurança + revalidateTag ou cache.del() em escrita"
      - rule: "Cache compartilhado servindo dados de tenants distintos pela mesma chave"
        correct: "Incluir tenantId na chave: tenant:{tenantId}:resource:{id}"
      - rule: "Cachear resposta de LLM com temperature > 0 esperando reuso"
        correct: "Só cachear com temperature=0; hashe prompt completo (SHA-256) na chave"
    linterHints:
      - "Detectar cache.set sem TTL explícito"
      - "Verificar namespacing de chave (prefixo de domínio + versão obrigatórios)"
      - "Instrumentar hit/miss rate por namespace (Prometheus, Datadog) — alerta se cair"
    relatedAdrCategories:
      - performance
      - backend
      - bff
      - seguranca

  - id: state-management
    summary: Categorização de estado, source of truth única, escopo mínimo e imutabilidade no frontend
    category: frontend
    defaultApplyTo:
      - "**/*.{tsx,jsx}"
    inverseHints:
      - zustand
      - redux
      - jotai
      - valtio
      - recoil
      - context
      - useState
    principleTemplate: |
      Classificar cada pedaço de estado antes de decidir onde armazenar: server state
      (fetch layer/RSC), URL state (filtros, paginação), form state (form library), UI local
      (useState), client global (store por domínio), derived (computar, não armazenar).
      Escopo mínimo: elevar apenas até o ancestral comum necessário. Imutabilidade estrita:
      concat/spread/filter em vez de push/splice/sort in-place. Server state nunca duplicado
      em store cliente — usar cache do fetch layer. Store global dividida por domínio, com
      método reset explícito.
    antiPatternTemplate:
      - rule: "Copiar resposta de fetch para Zustand/Context 'para evitar refetch'"
        correct: "Usar cache do fetch layer (React Query, Next fetch, RSC) como fonte canônica"
      - rule: "useEffect sincronizando um state com outro state"
        correct: "Substituir por derivação direta no render ou useMemo"
      - rule: "Mega-store global única contendo todo estado da aplicação"
        correct: "Stores separadas por domínio (userStore, cartStore) com reset explícito"
      - rule: "Boolean flags acumulados (isLoading + isError + isSuccess)"
        correct: "Enum de status: 'idle' | 'loading' | 'error' | 'success'"
    linterHints:
      - "Detectar push/splice/sort direto em variável de state (mutation proibida)"
      - "ESLint react-hooks/exhaustive-deps para evitar closures stale em useEffect"
      - "Detectar useState inicializado com prop e nunca sincronizado (prop drilling bug)"
    relatedAdrCategories:
      - frontend
      - performance
      - arquitetura
